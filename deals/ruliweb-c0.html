function ssAgo(iso){var d=new Date(iso);if(isNaN(d))return '';var s=Math.floor((Date.now()-d.getTime())/1000);if(s<60)return '등록 방금 전';var m=Math.floor(s/60);if(m<60)return '등록 '+m+'분 전';var h=Math.floor(m/60);if(h<24)return '등록 '+h+'시간 전';var dd=Math.floor(h/24);if(dd<7)return '등록 '+dd+'일 전';return '등록 '+(d.getMonth()+1)+'월 '+d.getDate()+'일';}function ssFillTimes(root){(root||document).querySelectorAll('[data-ago]').forEach(function(el){var t=ssAgo(el.getAttribute('data-ago'));if(t)el.textContent=t;});}function ssApplyToggleState(){var dark=document.documentElement.getAttribute('data-theme')==='dark';document.querySelectorAll('[data-theme-toggle]').forEach(function(b){b.setAttribute('aria-pressed',dark?'true':'false');b.setAttribute('aria-label',dark?'라이트 모드로 전환':'다크 모드로 전환');b.setAttribute('title',dark?'라이트 모드로 전환':'다크 모드로 전환');});}function ssInitTheme(){document.querySelectorAll('[data-theme-toggle]').forEach(function(btn){btn.addEventListener('click',function(){var cur=document.documentElement.getAttribute('data-theme');var sysDark=window.matchMedia&&window.matchMedia('(prefers-color-scheme: dark)').matches;var isDark=cur==='dark'||(cur!=='light'&&sysDark);var next=isDark?'light':'dark';document.documentElement.setAttribute('data-theme',next);try{localStorage.setItem('ssantime-theme',next);}catch(e){}ssApplyToggleState();});});ssApplyToggleState();}
ssInitTheme();ssFillTimes();
